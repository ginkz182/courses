stages:
  - test
  - build
  - deploy

test_job:
  stage: test
  image: node:18
  script:
    - npm install
    - npm test

build_docker:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker build -t my-app:${CI_COMMIT_SHORT_SHA} .

deploy_staging:
  stage: deploy
  script:
    - echo "Deploying to staging server..."
